services:
  - type: web
    name: ripplebot-backend
    env: python
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    # NOTE: Render's free tier has NO persistent disk and wipes the filesystem on
    # every deploy AND every ~15-min idle spin-down. Uploaded files therefore must
    # NOT rely on local disk — source files + companies.json are persisted in
    # Postgres (see backend/src/file_store.py) and rehydrated to a scratch dir on
    # boot. If you upgrade to a paid instance, add a `disk:` block here instead.
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: VECTOR_BACKEND
        value: pgvector
      - key: POSTGRES_URI
        sync: false
      - key: VOYAGE_API_KEY2
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"
