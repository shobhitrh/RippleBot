services:
  - type: web
    name: ripplebot-backend
    env: python
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    # Persistent disk — WITHOUT this, Render wipes uploaded files on every deploy
    # and restart (knowledge_base is ephemeral). Uploaded documents, meeting
    # markdowns, and companies.json must live here to survive.
    disk:
      name: ripplebot-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      # Point all persisted files at the mounted disk (uploads, companies.json).
      - key: DOCUMENTS_DIR
        value: /var/data/knowledge_base
      - key: VECTOR_BACKEND
        value: pgvector
      - key: POSTGRES_URI
        sync: false
      - key: VOYAGE_API_KEY2
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"
